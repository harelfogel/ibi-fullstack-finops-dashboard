services:
  - type: web
    name: ibi-finops-backend
    runtime: docker
    plan: free
    region: oregon
    branch: main
    autoDeployTrigger: commit
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ibi-finops-db
          property: connectionString
      - key: PORT
        value: "8000"
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: LLM_PROVIDER
        value: mock
      - key: LLM_MODEL
        value: claude-sonnet-4-20250514
      - key: LLM_TEMPERATURE
        value: "0.2"
      - key: LLM_MAX_TOKENS
        value: "1024"
      - key: CORS_ORIGINS
        value: '["http://localhost:3000"]'
      - key: CORS_ORIGIN_REGEX
        value: 'https://.*\.vercel\.app'

databases:
  - name: ibi-finops-db
    databaseName: finops_db
    user: finops
    plan: free
    region: oregon
    postgresMajorVersion: "16"
